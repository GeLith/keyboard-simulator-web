<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>UEditor Mock Test</title>
</head>
<body>
<div id="editor" contenteditable="true" style="width:600px;height:200px;border:1px solid #ccc;padding:10px;">
</div>
<div id="status">状态：等待测试...</div>
<script>
// 模拟 UE 全局对象
var UE = {
  instants: {}
};

// 模拟 editor 对象
var mockEditor = {
  body: document.getElementById('editor'),
  focus: function() { document.getElementById('editor').focus(); },
  execCommand: function(cmd, val) {
    if (cmd === 'insertText') {
      var el = document.getElementById('editor');
      el.focus();
      document.execCommand('insertText', false, val);
    }
  }
};

UE.instants['myEditor'] = mockEditor;
document.getElementById('status').textContent = '状态：UEditor mock 已就绪';
</script>
</body>
</html>
