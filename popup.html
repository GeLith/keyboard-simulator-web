<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>键盘输入模拟器</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <fieldset>
      <legend>输入内容</legend>
      <textarea id="inputContent" rows="6" placeholder="在此输入要模拟输入的文字..."></textarea>
    </fieldset>

    <fieldset>
      <legend>参数设置</legend>
      <div class="setting-row">
        <label>开始输入的延迟 (秒):</label>
        <div class="slider-container">
          <input type="range" id="startDelay" min="0" max="10" step="0.1" value="2">
          <span id="startDelayValue">2.00 秒</span>
        </div>
      </div>
      <div class="setting-row">
        <label>输入字符的间隔 (秒):</label>
        <div class="slider-container">
          <input type="range" id="charInterval" min="0.01" max="1" step="0.01" value="0.05">
          <span id="charIntervalValue">0.05 秒</span>
        </div>
      </div>
      <div class="setting-row">
        <label>重复次数:</label>
        <input type="number" id="repeatCount" min="1" max="100" value="1">
      </div>
    </fieldset>

    <div class="checkbox-row">
      <label><input type="checkbox" id="alwaysTop"> 窗口始终置顶</label>
      <label><input type="checkbox" id="clearAfterExec"> 执行后清除文本框</label>
    </div>

    <div class="button-row">
      <button id="startBtn" class="btn btn-primary">开始输入</button>
      <button id="stopBtn" class="btn btn-secondary" disabled>停止输出</button>
      <button id="saveBtn" class="btn">保存记录为TXT文件</button>
    </div>

    <fieldset>
      <legend>输出记录</legend>
      <textarea id="outputLog" rows="6" readonly placeholder="操作记录将显示在这里..."></textarea>
    </fieldset>
  </div>
  <script src="popup.js"></script>
</body>
</html>
